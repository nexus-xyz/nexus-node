name: Build Reth Image
on:
  push:
    tags:
      - 'reth/v*'
  workflow_dispatch:

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for keyless Cosign signing
    defaults:
      run:
        working-directory: eng/chain/reth
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main || \
            { echo "Error: tag does not point to a commit on main"; exit 1; }

      - name: Compute image tag
        id: version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE=nexusxyz/reth
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#reth/}"
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "$IMAGE:$VERSION" >> $GITHUB_OUTPUT
            echo "$IMAGE:main-$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's|[^a-zA-Z0-9._-]|-|g')
            TAG="${BRANCH}-${SHORT_SHA}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "$IMAGE:$TAG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./eng/chain/reth
          platforms: linux/amd64
          build-args: |
            BUILD_PROFILE=release
          push: true
          tags: ${{ steps.version.outputs.tags }}
          cache-from: type=gha,scope=reth
          cache-to: type=gha,scope=reth,mode=max

      - name: Get Image Digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect nexusxyz/reth:${{ steps.version.outputs.tag }} --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign Image with Cosign
        run: |
          cosign sign --yes \
            nexusxyz/reth:${{ steps.version.outputs.tag }}@${{ steps.digest.outputs.digest }}

      - name: Output Image Info
        run: |
          echo "Image tags:"
          echo "${{ steps.version.outputs.tags }}" | sed 's/^/  /'
          echo "Digest: ${{ steps.digest.outputs.digest }}"
